        tailwind.config = {

    <style>
        :root {
            --ink-900: #0f172a;
            --ink-700: #334155;
            --ink-500: #64748b;
            --ink-300: #cbd5e1;
            --ink-100: #f1f5f9;
            --warm-50: #fafaf9;
            --warm-100: #f5f5f4;
            --chong: #e8983a;
            --wen: #3b82c9;
            --bao: #2a9d6c;
            --zxf-red: #e63946;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            background: var(--warm-50);
            color: var(--ink-900);
            overflow-x: hidden;
        }
        ::selection { background: rgba(230, 57, 70, 0.2); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--ink-300); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--ink-500); }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.015;
            z-index: 9999;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes pulse-border {
            0%, 100% { border-color: rgba(230,57,70,0.3); }
            50% { border-color: rgba(230,57,70,0.8); }
        }
        @keyframes sieve-shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-2deg); }
            75% { transform: rotate(2deg); }
        }
        @keyframes progressFill {
            from { width: 0; }
        }
        @keyframes typewriter {
            from { width: 0; }
            to { width: 100%; }
        }
        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: var(--zxf-red); }
        }

        .animate-fade-in-up { animation: fadeInUp 0.7s ease-out forwards; }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-pulse-border { animation: pulse-border 2s infinite; }
        .animate-sieve { animation: sieve-shake 0.5s ease-in-out; }
        .progress-animate { animation: progressFill 1.2s ease-out forwards; }

        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }
        .stagger-5 { animation-delay: 0.5s; }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .hover-lift {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -12px rgba(15, 23, 42, 0.12);
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ZXF style message bubbles */
        .zxf-message {
            position: relative;
        }
        .zxf-message::before {
            content: '\25B8';
            position: absolute;
            left: -16px;
            top: 0;
            color: var(--zxf-red);
            font-size: 8px;
        }

        /* Sieve visualization */
        .sieve-mesh {
            background-image:
                linear-gradient(90deg, var(--ink-300) 1px, transparent 1px),
                linear-gradient(var(--ink-300) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Median badge */
        .median-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, #e63946 0%, #8b1a1a 100%);

            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 1px;
        }

        /* Typing effect for ZXF quotes */
        .zxf-typing {
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid var(--zxf-red);
            animation: typewriter 3s steps(40, end), blink-caret 0.75s step-end infinite;
            max-width: fit-content;
        }

        /* Dark section for mental models */
        .dark-section {
            background: var(--zxf-dark);
            color: #f0f0f0;
            position: relative;
        }
        .dark-section::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(230, 57, 70, 0.015) 2px,
                rgba(230, 57, 70, 0.015) 4px
            );
            pointer-events: none;
        }

        /* Card accent bar */
        .card-accent-bar {
            position: relative;
            overflow: hidden;
        }
        .card-accent-bar::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: var(--zxf-red);
            transform: scaleY(0);
            transition: transform 0.3s;
            transform-origin: top;
        }
        .card-accent-bar:hover::before {
            transform: scaleY(1);
        }

        /* Mobile sidebar */
        .sidebar-mobile {
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        .sidebar-mobile.open {
            transform: translateX(0);
        }

        .font-display {
            font-family: 'Noto Sans SC', system-ui, sans-serif !important;
        }

        .zxf-message::before {

        .edu-page {

        .edu-card {

        .brand-mark-footer {

        }

        .brand-mark-footer img {

        .top-nav-link {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 72px;
            padding: 0 24px;
            color: #172033;

        .top-nav-link::after {

        .top-nav-link.active {

        .top-nav-link.active::after {

        .chat-shell {
            height: calc(100vh - 132px);

        }

        .chat-main-stage {
            height: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;

        .chat-main-panel {
            height: 100%;

            background: rgba(255,255,255,0.96);
            border: 1px solid rgba(226, 232, 240, 0.92);

        .chat-scroll-zone {

        @media (max-width: 767px) {

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============================================
        // Icons (Lucide)
        // ============================================
        let lucideRefreshQueued = false;
        const scheduleLucideRefresh = () => {
            lucideRefreshQueued = false;
        };

        const Icon = ({ name, size = 20, className = '' }) => {
            const toPascalCase = (value) => String(value || '')
                .split('-')
                .map(part => part ? part.charAt(0).toUpperCase() + part.slice(1) : '')
                .join('');
            const normalizeSvgAttrs = (attrs = {}) => {
                const attrMap = {
                    'stroke-linecap': 'strokeLinecap',
                    'stroke-linejoin': 'strokeLinejoin',
                    'stroke-width': 'strokeWidth',
                    'fill-rule': 'fillRule',
                    'clip-rule': 'clipRule',
                    'class': 'className'
                };
                return Object.entries(attrs).reduce((next, [key, value]) => {
                    next[attrMap[key] || key] = value;
                    return next;
                }, {});
            };
            const renderIconNode = (node, idx) => {
                if (!Array.isArray(node)) return null;
                const [tag, attrs, children] = node;
                return React.createElement(
                    tag,
                    { key: idx, ...normalizeSvgAttrs(attrs) },
                    Array.isArray(children) ? children.map(renderIconNode) : null
                );
            };
            const iconNode = window.lucide && window.lucide.icons
                ? window.lucide.icons[toPascalCase(name)]
                : null;
            if (!iconNode) {
                return (
                    <span
                        aria-hidden="true"
                        className={`inline-block align-middle ${className}`}
                        style={{ width: size, height: size }}
                    />
                );
            }
            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={`lucide lucide-${name} ${className}`}
                    aria-hidden="true"
                >
                    {iconNode.map(renderIconNode)}
                </svg>
            );
        };

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, errorMessage: '' };
            }

            static getDerivedStateFromError(error) {
                return {
                    hasError: true,
                    errorMessage: error && error.message ? error.message : '未知前端错误'
                };
            }

            componentDidCatch(error, info) {
                console.error('页面渲染异常，已被错误边界拦截', error, info);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-warm-50 flex items-center justify-center px-4">
                            <div className="max-w-lg w-full bg-white border border-red-100 rounded-2xl shadow-sm p-6">
                                <div className="w-11 h-11 rounded-full bg-zxf-red text-white flex items-center justify-center mb-4">
                                    <span className="font-bold">!</span>
                                </div>
                                <h1 className="text-xl font-bold text-ink-900 mb-2">前端渲染遇到问题</h1>
                                <p className="text-sm text-ink-500 leading-relaxed mb-4">
                                    页面没有白屏退出，错误已被拦截。请刷新页面重试，或查看控制台定位具体组件。
                                </p>
                                <pre className="text-xs bg-ink-50 text-ink-600 rounded-lg p-3 overflow-auto mb-4">{this.state.errorMessage}</pre>
                                <button
                                    onClick={() => window.location.reload()}
                                    className="w-full py-2.5 bg-zxf-red text-white rounded-lg text-sm font-bold hover:bg-red-700 transition-colors"
                                >
                                    刷新页面
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // ============================================
        // API 鍩虹閰嶇疆
        // ============================================
        const API_BASE_STORAGE_KEY = 'zhiyuan_api_base_url';
        const getConfiguredApiBaseUrl = () => {
            try {
                const params = new URLSearchParams(window.location.search || '');
                const apiFromUrl = params.get('api') || params.get('apiBase') || params.get('api_base');
                if (apiFromUrl) {
                    const cleaned = apiFromUrl.replace(/\/+$/, '');
                    localStorage.setItem(API_BASE_STORAGE_KEY, cleaned);
                    return cleaned;
                }
                const stored = localStorage.getItem(API_BASE_STORAGE_KEY);
                if (stored) return stored.replace(/\/+$/, '');
            } catch (error) {
                console.warn('读取 API 地址配置失败', error);
            }
            return '';
        };

        const isBackendHostedApiOrigin = () => {
            const { protocol, hostname, port } = window.location;
            return /^https?:$/.test(protocol) && (
                port === '8000' ||
                /(^|[-.])proxy-8000(\.|$)/.test(hostname)
            );
        };

        const getDefaultApiBaseUrl = () => {
            if (isBackendHostedApiOrigin()) return window.location.origin;
            return 'http://127.0.0.1:8000';
        };

        const getApiBaseUrl = () => {
            const configured = getConfiguredApiBaseUrl();
            if (configured) return configured;
            return getDefaultApiBaseUrl();
        };

        const LLM_CONFIG_STORAGE_KEY = 'zhiyuan_user_llm_config_v1';
        const DEFAULT_USER_LLM_CONFIG = {
            enabled: false,
            provider: 'openai-compatible',
            base_url: 'https://api-inference.modelscope.cn/v1',
            model: 'Qwen/Qwen3-235B-A22B',
            model_candidates: '',
            api_key: ''
        };

        const readUserLlmConfig = () => {
            try {
                const raw = window.localStorage.getItem(LLM_CONFIG_STORAGE_KEY);
                if (!raw) return { ...DEFAULT_USER_LLM_CONFIG };
                return { ...DEFAULT_USER_LLM_CONFIG, ...JSON.parse(raw) };
            } catch (error) {
                console.warn('读取用户模型配置失败', error);
                return { ...DEFAULT_USER_LLM_CONFIG };
            }
        };

        const saveUserLlmConfig = (config = {}) => {
            const next = { ...DEFAULT_USER_LLM_CONFIG, ...config };
            window.localStorage.setItem(LLM_CONFIG_STORAGE_KEY, JSON.stringify(next));
            window.dispatchEvent(new CustomEvent('zhiyuan:user-llm-config-updated', { detail: next }));
            return next;
        };

        const clearUserLlmConfig = () => {
            window.localStorage.removeItem(LLM_CONFIG_STORAGE_KEY);
            const next = { ...DEFAULT_USER_LLM_CONFIG };
            window.dispatchEvent(new CustomEvent('zhiyuan:user-llm-config-updated', { detail: next }));
            return next;
        };

        const buildUserLlmRequestConfig = (config = readUserLlmConfig()) => {
            if (!config || !config.enabled) return null;
            const apiKey = String(config.api_key || '').trim();
            const baseUrl = String(config.base_url || '').trim().replace(/\/+$/, '');
            const model = String(config.model || '').trim();
            if (!apiKey || !baseUrl || !model) return null;
            const modelCandidates = String(config.model_candidates || '')
                .split(/[,\n，]+/)
                .map(item => item.trim())
                .filter(Boolean);
            return {
                provider: config.provider || 'openai-compatible',
                api_key: apiKey,
                base_url: baseUrl,
                model,
                model_candidates: modelCandidates
            };
        };

        // ============================================
        // Local synced recommendation plans
        // ============================================
        const SYNCED_PLANS_STORAGE_KEY = 'zxf_synced_recommendation_plans_v1';
        const SYNCED_PLANS_EVENT = 'zxf:synced-plans-updated';
        const MAX_SYNCED_PLANS = 10;

        const normalizeProfileValue = (value) => String(value || '').trim() || '未填';

        const getProfileStorageKey = (profile = {}) => [
            normalizeProfileValue(profile.province),
            normalizeProfileValue(profile.score),
            normalizeProfileValue(profile.rank),
            normalizeProfileValue(profile.subjects),
            normalizeProfileValue(profile.family),
            normalizeProfileValue(profile.cityPref),
            normalizeProfileValue(profile.majorPref),
            normalizeProfileValue(profile.risk),
        ].join('|');

        const getProfileLabel = (profile = {}) => {
            const pieces = [
                normalizeProfileValue(profile.province),
                `${normalizeProfileValue(profile.score)}分`,
                `浣嶆${normalizeProfileValue(profile.rank)}`,
                normalizeProfileValue(profile.subjects),
                normalizeProfileValue(profile.family),
            ];
            return pieces.filter(piece => piece && !piece.includes('未填')).join(' · ') || '当前考生画像';
        };

        const readSyncedPlanStore = () => {
            try {
                const raw = window.localStorage.getItem(SYNCED_PLANS_STORAGE_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch (error) {
                console.warn('读取本地同步方案失败', error);
                return {};
            }
        };

        const readSyncedPlansForProfile = (profile = {}) => {
            const store = readSyncedPlanStore();
            return store[getProfileStorageKey(profile)] || null;
        };

        const saveSyncedPlansForProfile = (profile = {}, plans = []) => {
            const key = getProfileStorageKey(profile);
            const store = readSyncedPlanStore();
            const payload = {
                profileKey: key,
                profileLabel: getProfileLabel(profile),
                updatedAt: new Date().toISOString(),
                plans: plans.slice(0, MAX_SYNCED_PLANS).map((plan, index) => ({ ...plan, order: index + 1 })),
            };
            store[key] = payload;
            window.localStorage.setItem(SYNCED_PLANS_STORAGE_KEY, JSON.stringify(store));
            window.dispatchEvent(new CustomEvent(SYNCED_PLANS_EVENT, { detail: payload }));
            return payload;
        };

        const clearSyncedPlansForProfile = (profile = {}) => {
            const key = getProfileStorageKey(profile);
            const store = readSyncedPlanStore();
            delete store[key];
            window.localStorage.setItem(SYNCED_PLANS_STORAGE_KEY, JSON.stringify(store));
            window.dispatchEvent(new CustomEvent(SYNCED_PLANS_EVENT, {
                detail: { profileKey: key, plans: [], updatedAt: new Date().toISOString() }
            }));
        };

        const getRiskChanceLabel = (risk = '') => {
            if (risk === '冲') return '低';
            if (risk === '保') return '高';
            return '中';
        };

        const normalizeSchoolLevel = (level = '') => {
            const raw = String(level || '').trim();
            if (!raw || raw === '院校' || raw === '待核验') return '待核验';
            if (raw.includes('985')) return '985';
            if (raw.includes('211')) return '211';
            if (raw.includes('双一流')) return '双一流';
            return '双非';
        };

        const inferSchoolLevelFromText = (text = '') => {
            if (/985/.test(text)) return '985';
            if (/211/.test(text)) return '211';
            if (/双一流/.test(text)) return '双一流';
            if (/普通一本|普通二本|本科|院校/.test(text)) return '双非';
            return '待核验';
        };

        const isNoRecommendationAnswer = (content = '') => {
            const compact = String(content || '').replace(/\s+/g, '');
            return /(?:筛|粗筛|结果).*?0个(?:志愿|候选|方案)/.test(compact)
                || /(?:候选|方案|志愿)(?:为零|是0|为0|为空)/.test(compact)
                || compact.includes('冲、稳、保三个档位一个都筛不出来')
                || /没法给你一个.*?学校名单/.test(compact)
                || compact.includes('没有可同步的院校推荐');
        };

        const parseRecommendationPlansFromText = (content = '') => {
            if (isNoRecommendationAnswer(content)) return [];
            const text = String(content || '');
            const sectionMatch = text.match(/(?:^|\n)\s*(?:\[|【)?\s*(?:院校推荐|推荐院校|学校推荐|推荐学校|冲稳保推荐|具体推荐|方案推荐)\s*(?:\]|】)?([\s\S]*?)(?=\n\s*(?:\[|【)?\s*(?:红旗风险|风险提醒|风险提示|核验清单|金句|本次联网来源)\s*(?:\]|】)?|$)/);
            if (!sectionMatch || isNoRecommendationAnswer(sectionMatch[1])) return [];
            const recommendationText = sectionMatch[1];
            const schoolRegex = /([\u4e00-\u9fa5A-Za-z0-9·（）()]{2,}(?:大学|学院))/g;
            const schools = Array.from(recommendationText.matchAll(schoolRegex))
                .map(match => match[1].trim())
                .filter((school, index, arr) => school.length >= 4 && arr.indexOf(school) === index)
                .slice(0, MAX_SYNCED_PLANS);

            return schools.map((school, index) => ({
                order: index + 1,
                school,
                major: '专业待核验',
                group: index < 3 ? '冲刺方案' : index < 7 ? '稳妥方案' : '保底方案',
                reason: '从回答文本中识别出的院校，专业组和录取位次需要回到官方数据核验。',
                risk: index < 3 ? '冲' : index < 7 ? '稳' : '保',
                riskLevel: index < 3 ? '中高风险' : index < 7 ? '中低风险' : '低风险',
                prob: index < 3 ? '低' : index < 7 ? '中' : '高',
                medianSalary: '待核验',
                schoolLevel: '待核验',
                irreplaceability: '待核验',
                fortune500: false,
                probabilityBasis: '文本兜底识别，最终以省考试院投档表和学校招生网为准。',
                salaryBasis: '收入与就业数据需以学校就业质量报告和真实行业去向核验。',
                syncedAt: new Date().toISOString(),
            }));
        };

                return {
                    order: index + 1,
                    school: plan.school || '院校待核验',
                    major: plan.major || '专业待核验',
                    matchScore: Number(plan.match_score || 0),

        const ChatSection = ({ userProfile, isProfileReady, onProfileComplete, onEditProfile }) => {

                        setSessions(Array.isArray(data) ? data : []);
                    }

                    console.error('加载会话失败', e);
                } finally {
                    setIsLoadingSessions(false);
                }
            };

            const createNewSession = async () => {
                try {
                    const now = new Date();
                    const title = `咨询 ${now.getMonth() + 1}-${now.getDate()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                    const res = await fetch(`${getApiBaseUrl()}/api/sessions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title: title,
                            user_profile: buildConsultContext()
                        })
                    });
                    if (res.ok) {
                        const session = await res.json();
                        setSessions(prev => [session, ...prev]);
                        setCurrentSessionId(session.id);
                        setMessages([]);
                    }
                } catch (e) {
                    console.error('创建会话失败', e);
                }
            };

            const switchSession = async (sessionId) => {
                setCurrentSessionId(sessionId);
                const session = sessions.find(s => s.id === sessionId);
                const sessionMessages = Array.isArray(session && session.messages) ? session.messages : [];
                if (sessionMessages.length > 0) {
                    const historyMessages = sessionMessages.map((msg, msgIndex) => ({
                        id: `${sessionId}-${msgIndex}`,
                        type: msg.role === 'user' ? 'user' : 'ai',
                        style: 'zxf',
                        content: msg.content
                    }));
                    setMessages(historyMessages);
                } else {
                    setMessages([]);
                }
                setSidebarOpen(false);
            };

            const deleteSession = async (e, sessionId) => {
                e.stopPropagation();
                try {
                    const res = await fetch(`${getApiBaseUrl()}/api/sessions/${sessionId}`, {
                        method: 'DELETE'
                    });
                    if (res.ok) {
                        setSessions(prev => prev.filter(s => s.id !== sessionId));
                        if (currentSessionId === sessionId) {
                            setCurrentSessionId(null);
                            setMessages([]);
                        }
                    }
                } catch (e) {
                    console.error('删除会话失败', e);
                }
            };

            const clearAllSessions = async () => {
                if (!Array.isArray(sessions) || !sessions.length || isLoadingSessions) return;
                try {
                    const sessionList = Array.isArray(sessions) ? sessions : [];
                    await Promise.all(sessionList.map(session =>
                        fetch(`${getApiBaseUrl()}/api/sessions/${session.id}`, { method: 'DELETE' })
                    ));

                    {

            const typeColors = {
                chong: { bg: 'bg-amber-50', text: 'text-amber-700', border: 'border-amber-200', bar: 'bg-amber-400', light: 'bg-amber-400/20', badge: 'bg-amber-100' },
                wen: { bg: 'bg-blue-50', text: 'text-blue-700', border: 'border-blue-200', bar: 'bg-accent-blue', light: 'bg-accent-blue/20', badge: 'bg-blue-100' },
                bao: { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-200', bar: 'bg-accent-green', light: 'bg-accent-green/20', badge: 'bg-emerald-100' },
            };

            const parseNumber = (value) => {
                if (value === undefined || value === null) return undefined;
                const parsed = parseInt(String(value).replace(/[^\d]/g, ''), 10);
                return Number.isNaN(parsed) ? undefined : parsed;
            };

            const splitPreference = (value) => {
                if (!value) return undefined;
                const raw = String(value).trim();
                const knownRegions = [
                    '北京', '天津', '河北', '山西', '内蒙古', '辽宁', '吉林', '黑龙江', '上海', '江苏', '浙江',
                    '安徽', '福建', '江西', '山东', '河南', '湖北', '湖南', '广东', '广西', '海南', '重庆',
                    '四川', '贵州', '云南', '西藏', '陕西', '甘肃', '青海', '宁夏', '新疆',
                    '南京', '苏州', '杭州', '宁波', '广州', '深圳', '成都', '武汉', '西安', '济南', '青岛'
                ];
                const items = raw
                    .split(/[、，,\s]+/)
                    .map(item => item.trim())
                    .filter(Boolean);
                if (items.length === 1) {
                    const gluedRegions = knownRegions
                        .map(region => ({ region, index: raw.indexOf(region) }))
                        .filter(item => item.index >= 0 && raw !== item.region)
                        .sort((a, b) => a.index - b.index)
                        .map(item => item.region);
                    if (gluedRegions.length > 1) return [...new Set(gluedRegions)];
                }
                return items.length ? items : undefined;
            };

            const formatPreference = (value) => {
                const items = splitPreference(value);
                return items ? items.join('、') : (value || '未填写');
            };

            const buildConsultContext = () => {
                const familyMap = {

                };

                Object.keys(context).forEach(key => context[key] === undefined && delete context[key]);

            };

            const hasActiveUserLlmConfig = () => Boolean(buildUserLlmRequestConfig(llmConfig));

            const updateLlmConfigField = (field, value) => {
                setLlmConfig(prev => ({ ...prev, [field]: value }));
            };

            const resetLlmConfig = () => {
                setLlmConfig(clearUserLlmConfig());
            };

            const hasConsultSectionBlock = (answer = '', labels = []) => {
                const source = String(answer || '');
                if (!source || !labels.length) return false;
                const escapedLabels = labels.map(label => label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
                const bracketHeading = `(?:^|\\n)\\s*(?:\\[|【)\\s*(?:${escapedLabels})\\s*(?:\\]|】)`;
                const plainHeading = `(?:^|\\n)\\s*(?:${escapedLabels})\\s*(?:[:：]|(?=\\n|$))`;
                return new RegExp(`${bracketHeading}|${plainHeading}`).test(source);
            };

            const hasSoulQuestionBlock = (answer = '') => hasConsultSectionBlock(answer, ['灵魂追问', '继续追问', '关键追问', '必须追问']);
            const hasRecommendationBlock = (answer = '') => hasConsultSectionBlock(answer, ['院校推荐', '推荐院校', '学校推荐', '推荐学校', '冲稳保推荐', '具体推荐', '方案推荐']);
            const consultSectionScore = (answer = '') => {
                const sectionGroups = [
                    ['分析过程', '分析拆解', '分析'],
                    ['核心判断', '总判断', '判断结论', '核心结论', '结论'],
                    ['灵魂追问', '继续追问', '关键追问', '必须追问'],
                    ['院校推荐', '推荐院校', '学校推荐', '推荐学校', '冲稳保推荐', '具体推荐', '方案推荐'],

                    ['核验清单', '下一步核验清单', '数据核验', '核验入口', '下一步'],
                    ['金句', '一句话总结', '总结']
                ];
                return sectionGroups.reduce((score, labels) => score + (hasConsultSectionBlock(answer, labels) ? 1 : 0), 0);
            };

            const isFactDataConsultQuestion = (question = '') => {
                const compact = String(question || '').replace(/\s+/g, '');
                if (!compact) return false;
                const hasFactMarker = /(中位数|薪资|工资|收入|就业率|就业数据|就业质量|500强|五百强|世界五百强|校招|招聘|招聘名单|企业名单)/.test(compact);
                if (!hasFactMarker) return false;
                const hasPersonalRecommendMarker = /(推荐|报考|志愿|冲稳保|院校推荐|学校推荐|推荐院校|推荐学校|能报|能上|该报|报什么|报哪些|怎么报|选什么学校|选哪些学校)/.test(compact);
                if (hasPersonalRecommendMarker) return false;
                return /(多少|是多少|有多少|哪些|哪几|哪里|去哪些|怎么查|有没有|能进|进不进|容易进|数据|名单|招聘|校招|中位数|薪资|工资|收入)/.test(compact);

            const isExplicitRecommendationQuestion = (question = '') => {
                if (isFactDataConsultQuestion(question)) return false;
                const compact = String(question || '').replace(/\s+/g, '');
                return /(院校推荐|学校推荐|推荐院校|推荐学校|冲稳保|志愿|填报|报考|推荐哪些学校|推荐什么学校|哪些学校适合|适合哪些学校|能报哪些|能上哪些|报哪些|报什么学校|选哪些学校|选什么学校|该报|怎么报|怎么选学校)/.test(compact);
            };

            const isUnrequestedRecommendationAnswer = (answer = '', question = '') => {
                if (isExplicitRecommendationQuestion(question)) return false;
                if (hasRecommendationBlock(answer)) return true;
                const compact = String(answer || '').replace(/\s+/g, '');
                if (!compact) return false;
                return /(冲稳保方案|冲刺方案|稳妥方案|保底方案|同步方案|待审核方案|哪个学校名字好听|哪所学校名字好听|先别问哪个学校|别先问哪个学校)/.test(compact);
            };

            const isOffTopicFactDataAnswer = (answer = '', question = '') => {
                if (!isFactDataConsultQuestion(question)) return false;
                const compact = String(answer || '').replace(/\s+/g, '');
                if (!compact) return true;
                if (/(灵魂追问|院校推荐|冲稳保|冲刺|保底|志愿表|哪个学校名字好听|哪所学校名字好听|先别问哪个学校)/.test(compact)) {
                    return true;

                if (/(中位数|薪资|工资|收入)/.test(String(question || '')) && !/(中位数|薪资|工资|收入|K|元|暂无)/.test(compact)) {
                    return true;

                return false;
            };

            const chooseMoreCompleteAnswer = (finalAnswer = '', streamedAnswer = '', question = '') => {
                const finalText = String(finalAnswer || '').trim();
                const streamedText = String(streamedAnswer || '').trim();
                if (!finalText) return streamedText;
                if (!streamedText) return finalText;
                const finalScore = consultSectionScore(finalText);
                const streamedScore = consultSectionScore(streamedText);
                const finalHasRecommendation = hasRecommendationBlock(finalText);
                const streamedHasRecommendation = hasRecommendationBlock(streamedText);
                if (
                    isUnrequestedRecommendationAnswer(finalText, question)
                    && !streamedHasRecommendation
                    && streamedText.length >= 80
                ) {
                    return streamedText;
                }
                if (
                    isFactDataConsultQuestion(question)
                    && (finalHasRecommendation || isOffTopicFactDataAnswer(finalText, question))
                    && !streamedHasRecommendation
                    && streamedText.length >= 80
                ) {
                    return streamedText;
                }
                if (streamedHasRecommendation && !finalHasRecommendation) return streamedText;
                if (streamedScore >= finalScore + 2 && streamedText.length >= Math.max(120, finalText.length * 0.65)) return streamedText;
                if (hasSoulQuestionBlock(streamedText) && streamedHasRecommendation && (!hasSoulQuestionBlock(finalText) || !finalHasRecommendation)) return streamedText;
                if (streamedText.length > finalText.length + 160) return streamedText;
                return finalText;
            };

            const insertBeforeRecommendationBlock = (answer = '', addition = '') => {
                if (!addition) return answer;
                const text = String(answer);
                const match = text.match(/(?:^|\n)\s*(?:\[|【)?\s*(?:院校推荐|推荐院校|学校推荐|推荐学校|冲稳保推荐|具体推荐|方案推荐)\s*(?:\]|】)?/);
                if (!match || match.index === undefined) return `${text}${addition}`;
                return `${text.slice(0, match.index)}${addition}${text.slice(match.index)}`;
            };

            const composeConsultDisplayContent = (answer, followUpQuestions = [], citationList = [], fallbackText = '', question = '') => {
                const baseAnswer = chooseMoreCompleteAnswer(answer, fallbackText, question) || '后端暂时没有给出明确回答。';
                const followUps = followUpQuestions.length
                    ? `\n\n[灵魂追问]\n${followUpQuestions.map(q => `- ${q}`).join('\n')}`
                    : '';
                const citations = citationList.length
                    ? `\n\n数据来源：\n${citationList.slice(0, 5).map((url, idx) => `${idx + 1}. ${url}`).join('\n')}`
                    : '';
                const contentWithFollowUps = followUps && !hasSoulQuestionBlock(baseAnswer)
                    ? insertBeforeRecommendationBlock(baseAnswer, followUps)
                    : baseAnswer;
                return `${contentWithFollowUps}${citations}`;
            };

            const formatStreamingConsultPreview = (text = '') => {
                const raw = String(text);
                const recommendationIndex = raw.search(/(?:\[)?\s*院校推荐\s*(?:\])?/);
                const soulIndex = raw.search(/(?:\[)?\s*灵魂追问\s*(?:\])?/);
                if (recommendationIndex >= 0 && (soulIndex < 0 || recommendationIndex < soulIndex)) {
                    return `${raw.slice(0, recommendationIndex).trimEnd()}\n\n[灵魂追问]\n正在整理关键追问，完整追问显示后再展开院校推荐。`;
                }
                return raw;
            };

            const sendConsultMessage = async (question) => {
                const trimmed = question.trim();
                if (!trimmed || isSending) return;
                const loadingId = `loading-${Date.now()}`;
                setIsSending(true);
                setMessages(prev => [
                    ...prev,
                    { type: 'user', content: trimmed },
                    {
                        id: loadingId,
                        type: 'ai',
                        style: 'zxf',
                        loading: true,
                        content: '我跟你说，志愿填报这事不能拍脑袋。先把分数、位次、省份、选科和家庭条件说清楚，我再按冲稳保给你看。',
                    }
                ]);

                try {
                    // 濡傛灉娌℃湁褰撳墠浼氳瘽锛岃嚜鍔ㄥ垱寤轰竴涓?
                    let activeSessionId = currentSessionId;
                    if (!activeSessionId) {
                        const now = new Date();
                        const title = `咨询 ${now.getMonth() + 1}-${now.getDate()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                        const createRes = await fetch(`${getApiBaseUrl()}/api/sessions`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ title: title, user_profile: buildConsultContext() })
                        });
                        if (createRes.ok) {
                            const newSession = await createRes.json();
                            setSessions(prev => [newSession, ...prev]);
                            setCurrentSessionId(newSession.id);
                            activeSessionId = newSession.id;
                        }
                    }

                    const userLlmRequestConfig = buildUserLlmRequestConfig(llmConfig);
                    const requestBody = {
                        session_id: activeSessionId,
                        question: trimmed,
                        context: buildConsultContext()
                    };
                    if (userLlmRequestConfig) {
                        requestBody.llm_config = userLlmRequestConfig;
                    }

                    const response = await fetch(`${getApiBaseUrl()}/api/consult/stream`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(requestBody)
                    });
                    if (!response.ok) {
                        const detail = await response.text();
                        throw new Error(detail || `请求失败：${response.status}`);
                    }
                    if (response.body) {
                        const reader = response.body.getReader();
                        const decoder = new TextDecoder('utf-8');
                        let buffer = '';
                        let streamedText = '';
                        let finalData = null;

                        const applyStreamFinal = (data) => {
                            const followUpQuestions = Array.isArray(data.follow_up_questions) ? data.follow_up_questions : [];
                            const citationList = Array.isArray(data.citations) ? data.citations : [];
                            const displayContent = composeConsultDisplayContent(data.answer, followUpQuestions, citationList, streamedText, trimmed);
                            const structuredPlans = isFactDataConsultQuestion(trimmed) && !hasRecommendationBlock(displayContent)
                                ? []
                                : normalizeBackendRecommendationPlans(data.recommendation_plans);
                            setMessages(prev => prev.map(msg => (
                                msg.id === loadingId
                                    ? {
                                        id: loadingId,
                                        type: 'ai',
                                        style: 'zxf',
                                        content: displayContent,
                                        cards: [],
                                        syncPlans: structuredPlans
                                    }
                                    : msg
                            )));
                        };

                        const handleSseBlock = (block) => {
                            const eventLine = block.split('\n').find(line => line.startsWith('event:'));
                            const dataLines = block.split('\n').filter(line => line.startsWith('data:'));
                            if (!eventLine || !dataLines.length) return;
                            const event = eventLine.slice(6).trim();
                            const rawData = dataLines.map(line => line.slice(5).trim()).join('\n');
                            const data = rawData ? JSON.parse(rawData) : {};

                            if (event === 'status' && !streamedText) {
                                setMessages(prev => prev.map(msg => (
                                    msg.id === loadingId ? { ...msg, content: data.message || msg.content } : msg
                                )));
                            } else if (event === 'delta' && data.text) {
                                streamedText += data.text;
                                setMessages(prev => prev.map(msg => (
                                    msg.id === loadingId
                                        ? { ...msg, loading: false, content: formatStreamingConsultPreview(streamedText), cards: [] }
                                        : msg
                                )));
                            } else if (event === 'final') {
                                finalData = data;
                                applyStreamFinal(data);
                            } else if (event === 'error') {
                                throw new Error(data.message || 'stream error');
                            }
                        };

                        while (true) {
                            const { value, done } = await reader.read();
                            if (done) break;
                            buffer += decoder.decode(value, { stream: true });
                            const blocks = buffer.split('\n\n');
                            buffer = blocks.pop() || '';
                            blocks.forEach(handleSseBlock);
                        }
                        if (buffer.trim()) handleSseBlock(buffer);
                        if (!finalData && streamedText) {
                            setMessages(prev => prev.map(msg => (
                                msg.id === loadingId
                                    ? { ...msg, loading: false, content: streamedText, cards: [], syncPlans: [] }
                                    : msg
                            )));
                        }
                        return;
                    }

                    const data = await response.json();
                    const followUpQuestions = Array.isArray(data.follow_up_questions) ? data.follow_up_questions : [];
                    const citationList = Array.isArray(data.citations) ? data.citations : [];
                    const displayContent = composeConsultDisplayContent(data.answer, followUpQuestions, citationList, '', trimmed);
                    const structuredPlans = isFactDataConsultQuestion(trimmed) && !hasRecommendationBlock(displayContent)
                        ? []
                        : normalizeBackendRecommendationPlans(data.recommendation_plans);
                    setMessages(prev => prev.map(msg => (
                        msg.id === loadingId
                            ? {
                                id: loadingId,
                                type: 'ai',
                                style: 'zxf',
                                content: displayContent,
                                cards: [],
                                syncPlans: structuredPlans
                            }
                            : msg
                    )));
                } catch (error) {
                    setMessages(prev => prev.map(msg => (
                        msg.id === loadingId
                            ? {
                                id: loadingId,
                                type: 'ai',
                                style: 'zxf',
                                content: `后端现在没接上：${error.message}。当前前端请求地址是 ${getApiBaseUrl()}。如果在魔搭 Notebook 运行后端，请把页面地址加上 ?api=你的8000端口公网代理地址，或在控制台执行 localStorage.setItem('${API_BASE_STORAGE_KEY}', '你的8000端口公网代理地址') 后刷新。`,
                                cards: []
                            }
                        : msg
                    )));
                } finally {
                    setIsSending(false);
                }
            };

            const handleSend = () => {
                if (!inputValue.trim() || isSending) return;
                const question = inputValue;
                setInputValue('');
                sendConsultMessage(question);
            };

            const handleQuickQuestion = (q) => {
                sendConsultMessage(q);
            };

            const handleSyncPlans = (messageId, content, explicitPlans = null) => {
                const plans = Array.isArray(explicitPlans) && explicitPlans.length
                    ? explicitPlans
                    : [];
                if (!plans.length) {
                    setMessages(prev => prev.map(msg => (
                        msg.id === messageId
                            ? { ...msg, syncStatus: '这条回答里没有识别到可同步的院校推荐。' }
                            : msg
                    )));
                    return;
                }
                const saved = saveSyncedPlansForProfile(userProfile, plans);
                setMessages(prev => prev.map(msg => (
                    msg.id === messageId
                        ? {
                            ...msg,
                            syncPlans: saved.plans,
                            syncStatus: `已同步 ${saved.plans.length} 所到我的当前方案。当前画像最多保留 ${MAX_SYNCED_PLANS} 所，新同步会替换旧方案。`
                        }
                        : msg
                )));
            };

            const renderMessageContent = (content = '') => {
                const lines = String(content).split('\n');
                return lines.map((line, lineIdx) => {
                    const normalizedLine = line.replace(/^\s*\*\s+/, '- ');
                    const parts = normalizedLine.split(/(\*\*[^*]+\*\*|\*[^*\n]+\*)/g);
                    return (
                        <React.Fragment key={lineIdx}>
                            {parts.map((part, partIdx) => {
                                if (part.startsWith('**') && part.endsWith('**')) {
                                    return <strong key={partIdx} className="font-bold text-white">{part.slice(2, -2)}</strong>;
                                }
                                if (part.startsWith('*') && part.endsWith('*') && part.length > 2) {
                                    return <strong key={partIdx} className="font-semibold text-white">{part.slice(1, -1)}</strong>;
                                }
                                return <React.Fragment key={partIdx}>{part.replace(/\*/g, '')}</React.Fragment>;
                            })}
                            {lineIdx < lines.length - 1 && <br />}
                        </React.Fragment>
                    );
                });
            };

            const getSessionGroup = (session) => {
                const createdAt = session.created_at ? new Date(session.created_at) : new Date();
                const today = new Date();
                const startOfToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                const startOfYesterday = new Date(startOfToday);
                startOfYesterday.setDate(startOfYesterday.getDate() - 1);
                if (createdAt >= startOfToday) return '今天';
                if (createdAt >= startOfYesterday) return '昨天';
                return '更早';
            };

            const safeSessions = Array.isArray(sessions) ? sessions : [];

            const groupedSessions = safeSessions.reduce((groups, session) => {
                const group = getSessionGroup(session);
                groups[group].push(session);
                return groups;
            }, { '今天': [], '昨天': [], '更早': [] });

            const profileStrategy = userProfile.family === '富裕'
                ? '策略：可以追求热爱，试错空间更大'
                : userProfile.family === '中产'
                    ? '策略：平衡理想与现实'
                    : '策略：先谋生再谈热爱，优先追求确定性';

            const formatSessionTime = (session) => {
                if (!session.created_at) return '';
                return new Date(session.created_at).toLocaleString('zh-CN', {
                    month: 'numeric',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            };

            const historyRows = safeSessions;

            return (
                <section id="chat" className="edu-page">
                    <div className="max-w-[1500px] mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid grid-cols-1 xl:grid-cols-[320px_minmax(0,1fr)] gap-7 items-stretch chat-shell">
                            {/* History Sidebar - Desktop */}
                            <aside className="hidden xl:block h-full min-h-0">
                                <div className="edu-card p-6 sticky top-24 h-full min-h-0">
                                    <button
                                        onClick={createNewSession}
                                        disabled={isLoadingSessions}
                                        className="w-full flex items-center justify-center gap-2 py-4 rounded-2xl bg-zxf-red text-white text-base font-bold hover:bg-red-700 transition-colors disabled:opacity-50 shadow-lg shadow-red-500/20"
                                    >
                                        <Icon name="plus" size={20} />
                                        新建对话
                                    </button>

                                    <div className="mt-6">
                                        <div className="flex items-center justify-between mb-5">
                                            <h3 className="font-black text-ink-900 text-lg">历史对话</h3>
                                            {isLoadingSessions && <Icon name="loader-2" size={14} className="animate-spin text-ink-400" />}
                                            <button
                                                onClick={clearAllSessions}
                                                disabled={!safeSessions.length || isLoadingSessions}
                                                className="inline-flex items-center gap-1.5 text-xs text-ink-400 hover:text-zxf-red disabled:opacity-40 disabled:hover:text-ink-400"
                                            >
                                                <Icon name="trash-2" size={14} />
                                                清空历史记录
                                            </button>
                                        </div>

                                        <div className="space-y-3 max-h-[calc(100vh-320px)] overflow-y-auto pr-1">
                                            {historyRows.map((session, index) => {
                                                const active = safeSessions.length ? (currentSessionId ? currentSessionId === session.id : index === 0) : index === 0;
                                                return (
                                                    <div
                                                        key={session.id}
                                                        onClick={() => switchSession(session.id)}
                                                        className={`group flex items-center gap-3 px-4 py-3.5 rounded-2xl cursor-pointer transition-colors ${
                                                            active
                                                                ? 'bg-red-50 text-zxf-red'
                                                                : 'bg-white text-ink-700 hover:bg-ink-50'
                                                        }`}
                                                    >
                                                        <Icon name="message-circle" size={17} className={active ? 'text-zxf-red' : 'text-ink-400'} />
                                                        <div className="min-w-0 flex-1">
                                                            <div className={`text-sm truncate ${active ? 'font-bold' : 'font-medium'}`}>{session.title}</div>
                                                        </div>
                                                        <div className="text-xs text-ink-400 shrink-0">{formatSessionTime(session)}</div>
                                                        <button
                                                            onClick={(e) => deleteSession(e, session.id)}
                                                            className="hidden group-hover:inline-flex p-1.5 text-ink-400 hover:text-red-500 hover:bg-red-100 rounded-md transition-colors"
                                                            title="删除会话"
                                                        >
                                                            <Icon name="trash-2" size={12} />
                                                        </button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            </aside>

                            {/* Main Chat Area */}
                            <div className="flex-1 min-w-0 h-full min-h-0">
                                <div className="chat-main-panel chat-main-stage overflow-hidden">
                                    {/* Chat header */}
                                    <div className="flex items-center justify-between px-8 py-5 border-b border-ink-100 bg-white">
                                        <div className="flex items-center gap-3">
                                            <div className="w-12 h-12 rounded-full bg-zxf-red flex items-center justify-center shadow-lg shadow-red-500/25">
                                                <Icon name="brain" size={22} className="text-white" />
                                            </div>
                                            <div>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xl font-black text-ink-900">智小选 · AI 顾问</span>
                                                    <span className="px-2 py-0.5 rounded-md bg-red-50 text-zxf-red border border-red-100 text-xs font-bold">官方版</span>
                                                </div>
                                                <div className="text-sm text-ink-500 mt-1">
                                                    基于就业数据 · 中位数原则
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <button
                                                onClick={() => setLlmConfigOpen(prev => !prev)}
                                                className={`hidden sm:inline-flex items-center gap-2 px-3 py-2 rounded-xl border text-xs font-black transition-colors ${
                                                    hasActiveUserLlmConfig()
                                                        ? 'bg-emerald-50 text-emerald-700 border-emerald-100 hover:bg-emerald-100'
                                                        : 'bg-ink-50 text-ink-600 border-ink-100 hover:bg-ink-100'
                                                }`}
                                                title="配置自己的 OpenAI-compatible API Key"
                                            >
                                                <Icon name="key-round" size={15} />
                                                {hasActiveUserLlmConfig() ? '自带 Key 已启用' : '模型配置'}
                                            </button>
                                            <button
                                                onClick={onEditProfile}
                                                className="hidden sm:inline-flex items-center gap-2 px-3 py-2 rounded-xl bg-red-50 text-zxf-red border border-red-100 text-xs font-black hover:bg-red-100 transition-colors"
                                                title="修改考生画像"
                                            >
                                                <Icon name="user-pen" size={15} />
                                                {userProfile.province || '考生'} · {userProfile.score || '未填'}分
                                            </button>
                                            <button className="xl:hidden p-2 text-ink-500 hover:bg-ink-50 rounded-lg" onClick={() => setSidebarOpen(!sidebarOpen)}>
                                                <Icon name="history" size={18} />
                                            </button>
                                        </div>
                                    </div>

                                    {llmConfigOpen && (
                                        <div className="px-8 py-5 border-b border-ink-100 bg-ink-50">
                                            <div className="max-w-5xl mx-auto bg-white border border-ink-100 rounded-2xl p-5 shadow-sm">
                                                <div className="flex items-start justify-between gap-4 mb-4">
                                                    <div>
                                                        <div className="flex items-center gap-2 text-ink-900 font-black">
                                                            <Icon name="key-round" size={18} className="text-zxf-red" />
                                                            自带 API Key 调大模型
                                                        </div>
                                                        <p className="text-xs text-ink-500 mt-1 leading-5">
                                                            支持 OpenAI-compatible 接口。API Key 仅保存在当前浏览器 localStorage；每次咨询时临时发送给后端，不写入会话记录。
                                                        </p>
                                                    </div>
                                                    <button
                                                        onClick={() => setLlmConfigOpen(false)}
                                                        className="p-2 rounded-lg text-ink-400 hover:bg-ink-50 hover:text-ink-700"
                                                    >
                                                        <Icon name="x" size={16} />
                                                    </button>
                                                </div>

                                                <label className="flex items-center gap-2 text-sm font-bold text-ink-700 mb-4">
                                                    <input
                                                        type="checkbox"
                                                        checked={Boolean(llmConfig.enabled)}
                                                        onChange={(e) => updateLlmConfigField('enabled', e.target.checked)}
                                                        className="w-4 h-4 accent-red-600"
                                                    />
                                                    启用我的模型配置
                                                </label>

                                                <div className="grid md:grid-cols-2 gap-3">
                                                    <label className="block">
                                                        <span className="text-xs font-bold text-ink-500">Base URL（/v1 或 /chat/completions）</span>
                                                        <input
                                                            type="text"
                                                            value={llmConfig.base_url || ''}
                                                            onChange={(e) => updateLlmConfigField('base_url', e.target.value)}
                                                            placeholder="https://api-inference.modelscope.cn/v1"
                                                            className="mt-1 w-full px-3 py-2 rounded-xl border border-ink-100 text-sm outline-none focus:border-zxf-red"
                                                        />
                                                    </label>
                                                    <label className="block">
                                                        <span className="text-xs font-bold text-ink-500">模型 ID</span>
                                                        <input
                                                            type="text"
                                                            value={llmConfig.model || ''}
                                                            onChange={(e) => updateLlmConfigField('model', e.target.value)}
                                                            placeholder="Qwen/Qwen3-235B-A22B"
                                                            className="mt-1 w-full px-3 py-2 rounded-xl border border-ink-100 text-sm outline-none focus:border-zxf-red"
                                                        />
                                                    </label>
                                                    <label className="block">
                                                        <span className="text-xs font-bold text-ink-500">API Key</span>
                                                        <input
                                                            type="password"
                                                            value={llmConfig.api_key || ''}
                                                            onChange={(e) => updateLlmConfigField('api_key', e.target.value)}
                                                            placeholder="sk-..."
                                                            className="mt-1 w-full px-3 py-2 rounded-xl border border-ink-100 text-sm outline-none focus:border-zxf-red"
                                                        />
                                                    </label>
                                                    <label className="block">
                                                        <span className="text-xs font-bold text-ink-500">备用模型（可选，逗号分隔）</span>
                                                        <input
                                                            type="text"
                                                            value={llmConfig.model_candidates || ''}
                                                            onChange={(e) => updateLlmConfigField('model_candidates', e.target.value)}
                                                            placeholder="Qwen/Qwen3-30B-A3B, deepseek-chat"
                                                            className="mt-1 w-full px-3 py-2 rounded-xl border border-ink-100 text-sm outline-none focus:border-zxf-red"
                                                        />
                                                    </label>
                                                </div>

                                                <div className="flex flex-wrap items-center justify-between gap-3 mt-4">
                                                    <div className={`text-xs font-bold ${hasActiveUserLlmConfig() ? 'text-emerald-700' : 'text-amber-700'}`}>
                                                        {hasActiveUserLlmConfig()
                                                            ? '配置完整：下一次提问会优先使用你的 API Key。'
                                                            : '未启用或缺少 API Key / Base URL / 模型 ID，将继续使用后端默认模型。'}
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <button
                                                            onClick={resetLlmConfig}
                                                            className="px-3 py-2 rounded-xl border border-ink-100 text-xs font-bold text-ink-500 hover:bg-ink-50"
                                                        >
                                                            清空配置
                                                        </button>
                                                        <button
                                                            onClick={() => setLlmConfigOpen(false)}
                                                            className="px-3 py-2 rounded-xl bg-zxf-red text-white text-xs font-bold hover:bg-red-700"
                                                        >
                                                            保存并关闭
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Messages */}
                                    <div className="chat-scroll-zone px-8 py-8 space-y-7 overflow-y-auto">
                                        {messages.map((msg, idx) => (
                                            <div key={idx} className={`flex gap-4 ${msg.type === 'user' ? 'justify-end' : ''}`}>

        // ============================================
        // 7. Comparison Section - 鏂规瀵规瘮锛堝寮虹増锛?
        // ============================================
        const ComparisonSection = ({ userProfile }) => {
            const [syncedPayload, setSyncedPayload] = useState(() => readSyncedPlansForProfile(userProfile));

            useEffect(() => {
                setSyncedPayload(readSyncedPlansForProfile(userProfile));
            }, [userProfile.province, userProfile.score, userProfile.rank, userProfile.subjects, userProfile.family, userProfile.cityPref, userProfile.majorPref, userProfile.risk]);

            useEffect(() => {
                const handleSyncedPlansUpdated = (event) => {
                    if (event.detail && event.detail.profileKey === getProfileStorageKey(userProfile)) {
                        setSyncedPayload(event.detail);
                    }
                };
                const handleStorage = () => setSyncedPayload(readSyncedPlansForProfile(userProfile));
                window.addEventListener(SYNCED_PLANS_EVENT, handleSyncedPlansUpdated);
                window.addEventListener('storage', handleStorage);
                return () => {
                    window.removeEventListener(SYNCED_PLANS_EVENT, handleSyncedPlansUpdated);
                    window.removeEventListener('storage', handleStorage);
                };
            }, [userProfile]);

            const isSynced = Boolean(syncedPayload && syncedPayload.plans && syncedPayload.plans.length);
            const plans = isSynced ? syncedPayload.plans : [];
            const countByRisk = (risk) => plans.filter(plan => plan.risk === risk).length;
            const salaryNumbers = plans.map(plan => parseFloat(String(plan.medianSalary || '').replace(/[^\d.]/g, ''))).filter(value => !Number.isNaN(value));
            const salaryRange = salaryNumbers.length ? `${Math.min(...salaryNumbers).toFixed(1).replace('.0', '')}-${Math.max(...salaryNumbers).toFixed(1).replace('.0', '')}K` : '未同步';
            const riskStyles = {
                '冲': 'bg-amber-50 text-amber-700 border-amber-200',
                '稳': 'bg-blue-50 text-blue-700 border-blue-200',
                '保': 'bg-emerald-50 text-emerald-700 border-emerald-200',
            };
            const compactList = (items = []) => Array.from(new Set(
                (Array.isArray(items) ? items : [])
                    .map(item => String(item || '').trim())
                    .filter(Boolean)
            ));
            const resolvePlanAudit = (plan) => {
                const officialVerification = Array.isArray(plan.officialVerification) ? plan.officialVerification : [];
                const citationLinks = Array.isArray(plan.citations)
                    ? plan.citations
                        .filter(Boolean)
                        .slice(0, 3)
                        .map((url, sourceIdx) => ({
                            label: sourceIdx === 0 ? '官方核验入口' : `核验来源 ${sourceIdx + 1}`,
                            type: sourceIdx === 0 ? '联网来源' : '参考来源',
                            url,
                            desc: '打开后优先查招生计划、专业组、最低位次和调剂规则。',
                        }))
                    : [];
                const links = officialVerification.length
                    ? officialVerification
                    : [
                        ...(plan.admissionsUrl ? [{
                            label: `${plan.school}本科招生网`,
                            type: '学校招生网',
                            url: plan.admissionsUrl,
                            desc: '查招生计划、专业最低分、专业组和调剂规则。',
                        }] : []),
                        ...citationLinks,
                    ];
                const requiredTables = compactList(plan.requiredTables).length

                    const target = Number(value || 0);
                    const duration = 720;
                    const tick = (now) => {
