                                            <p className="mt-2 text-sm text-ink-500">点击行业标签可快速聚焦对应职业样本。</p>
                                        </div>
                                        <button onClick={() => setActiveIndustry('全部')} className="text-xs font-bold text-ink-500 hover:text-zxf-red">清除行业筛选</button>
                                    </div>
                                    <div className="flex flex-wrap gap-3">
                                        {industryTags.map(tag => (
                                            <button
                                                key={tag}
                                                onClick={() => setActiveIndustry(tag)}
                                                className={`rounded-full border px-4 py-2 text-sm font-bold transition ${activeIndustry === tag ? 'bg-zxf-red border-zxf-red text-white shadow-lg shadow-red-500/20' : 'bg-white border-ink-100 text-ink-700 hover:border-red-200 hover:text-zxf-red'}`}
                                            >
                                                {tag}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="edu-card-soft p-6 sm:p-8 reveal visible">
                                    <div className="flex items-start gap-4">
                                        <div className="w-11 h-11 rounded-2xl bg-ink-900 text-white flex items-center justify-center flex-shrink-0">
                                            <Icon name="clipboard-list" size={21} />
                                        </div>
                                        <div>
                                            <h3 className="font-black text-ink-900">数据说明</h3>
                                            <div className="mt-3 grid md:grid-cols-2 gap-x-8 gap-y-2 text-sm leading-relaxed text-ink-600">
                                                <p>行业薪资：参考公开统计工资数据与招聘薪酬趋势。</p>
                                                <p>就业趋势：参考人社公开就业形势与职业供需信息。</p>
                                                <p>专业关联：基于专业培养方向与典型职业映射。</p>
                                                <p>指数说明：平台综合评估，不代表官方录取或就业承诺。</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </>
                        )}
                    </div>

                    {showIndexInfo && (
                        <div className="fixed inset-0 z-[95] flex items-center justify-center px-4">
                            <button className="absolute inset-0 bg-ink-950/35 backdrop-blur-sm" onClick={() => setShowIndexInfo(false)} aria-label="关闭指标说明"></button>
                            <div className="relative max-w-lg w-full rounded-[28px] bg-white p-7 shadow-2xl">
                                <button onClick={() => setShowIndexInfo(false)} className="absolute right-5 top-5 w-9 h-9 rounded-full border border-ink-100 flex items-center justify-center text-ink-500 hover:text-zxf-red">
                                    <Icon name="x" size={18} />
                                </button>
                                <h3 className="text-xl font-black text-ink-900">就业稳定指数说明</h3>
                                <p className="mt-4 text-sm leading-relaxed text-ink-600">
                                    就业稳定指数为综合评估指标，不等同于真实就业率或官方失业率。它用于辅助比较不同职业的相对稳定性。
                                </p>
                                <div className="mt-5 space-y-3 text-sm">
                                    {[
                                        ['岗位需求持续性', '30%'],
                                        ['供需缺口强度', '20%'],
                                        ['行业抗周期能力', '20%'],
                                        ['职业流动率反向指标', '15%'],
                                        ['政策与社会长期需求支撑', '15%']
                                    ].map(([label, value]) => (
                                        <div key={label} className="flex items-center justify-between rounded-2xl bg-ink-50 px-4 py-3">
                                            <span className="font-bold text-ink-700">{label}</span>
                                            <span className="font-mono font-black text-zxf-red">{value}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    <CareerDetailDrawer />
                </section>
            );
        };
        const DisclaimerSection = () => (
            <section className="py-12 bg-white border-t border-ink-100">
                <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex items-start gap-4 p-6 bg-zxf-dark rounded-2xl border border-zxf-border reveal">
                        <div className="w-10 h-10 rounded-full bg-zxf-red/20 flex items-center justify-center flex-shrink-0">
                            <Icon name="shield-alert" size={20} className="text-zxf-red" />
                        </div>
                        <div>
                            <h3 className="font-bold text-white mb-2">重要提示 · 诚实边界</h3>
                            <p className="text-sm text-gray-400 leading-relaxed">
                                AI 建议基于历史就业数据、招生信息和规则推演，<strong className="text-gray-300">仅供参考</strong>。最终志愿填报请结合官方招生计划、招生章程和个人实际情况综合判断。
                            </p>
                            <p className="text-sm text-gray-500 leading-relaxed mt-2">
                                薪资数据优先使用中位数思路，不同城市、企业和年份差异很大。能联网核验的数据应以官方或可信来源为准。
                            </p>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Footer = () => (
            <footer className="py-10 bg-zxf-dark text-gray-500 border-t border-zxf-border">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="flex items-center gap-2">
                            <div className="brand-mark-footer shrink-0" aria-hidden="true">
                                <img src="assets/brand-logo.png" alt="" />
                            </div>
                            <div>
                                <span className="font-display text-white font-bold">志愿智选</span>
                            </div>
                        </div>
                        <div className="flex gap-6 text-sm">
                            <a href="#" className="hover:text-white transition-colors">关于我们</a>
                            <a href="#" className="hover:text-white transition-colors">数据来源</a>
                            <a href="#" className="hover:text-white transition-colors">隐私政策</a>
                            <a href="#" className="hover:text-white transition-colors">联系方式</a>
                        </div>
                        <div className="text-xs text-gray-600 font-mono">数据更新：2026 年 5 月 · 支持全国多地区</div>
                    </div>
                    <div className="mt-6 pt-6 border-t border-zxf-border text-center">
                        <p className="text-xs text-gray-600">选择比努力更重要，但有得选的前提是你足够努力。</p>
                    </div>
                </div>
            </footer>
        );

        // ============================================
        // Main App
        // ============================================
        const App = () => {
            const [showSoulQuery, setShowSoulQuery] = useState(false);
            const [activePage, setActivePage] = useState(getRouteFromHash);
            const [isChatStarted, setIsChatStarted] = useState(false);
            const [userProfile, setUserProfile] = useState({
                province: '',
                score: '',
                rank: '',
                subjects: '',
                cityPref: '',
                majorPref: '',
                family: '普通',
                risk: '均衡'
            });

            useEffect(() => {
                const handleHashChange = () => setActivePage(getRouteFromHash());
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            useEffect(() => {
                scheduleLucideRefresh();

                if (!('IntersectionObserver' in window)) {
                    document.querySelectorAll('.reveal').forEach((el) => el.classList.add('visible'));
                    return;
                }

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
                return () => observer.disconnect();
            }, []);

            const handleSoulQueryComplete = (data) => {
                setUserProfile(prev => ({...prev, ...data}));
                setIsChatStarted(true);
            };

            const handleProfileComplete = (data) => {
                setUserProfile(prev => ({...prev, ...data}));
                setIsChatStarted(true);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleNavigate = (pageKey, hash) => {
                setActivePage(pageKey);
                if (window.location.hash !== hash) {
                    window.location.hash = hash;
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const renderActivePage = () => {
                if (activePage === 'universities') return <UniversitiesSection />;
                if (activePage === 'sync') return <ComparisonSection userProfile={userProfile} />;
                if (activePage === 'data') return <DataAnalysisSection />;
                return (
                    <ChatSection
                        userProfile={userProfile}
                        isProfileReady={isChatStarted}
                        onProfileComplete={handleProfileComplete}
                        onEditProfile={() => setIsChatStarted(false)}
                    />
                );
            };

            return (
                <div className="min-h-screen bg-warm-50">
                    <Navbar activePage={activePage} onNavigate={handleNavigate} />
                    {renderActivePage()}

                    <SoulQueryModal
                        isOpen={showSoulQuery}
                        onClose={() => setShowSoulQuery(false)}
                        onComplete={handleSoulQueryComplete}
                    />
                </div>
            );
        };

        window.addEventListener('error', (event) => {
            console.error('前端全局错误:', event.error || event.message);
        });
        window.addEventListener('unhandledrejection', (event) => {
            console.error('前端未处理异步错误:', event.reason);
        });

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
